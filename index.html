<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Planeta Sustentável, Agro Forte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Planeta Sustentável, Agro Forte</h1>

                <p>Pontuação: <span id="score">0</span></p>

            <div id="question-container" class="hide">

        </div>
    </div>
    <script src="script.js"></script>
